name: Build and Release Artifacts

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v1.0.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            grub-pc-bin grub-common \
            gdisk e2fsprogs wget python3 xorriso mtools

      - name: Build release artifacts
        run: make release-all

      - name: Verify artifact directory
        run: ls -lah release/dist

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version || github.ref_name }}
          body_path: .github/release-body.md
          files: |
            release/dist/kfs-full.img
            release/dist/kfs-min.img
            release/dist/kfs-kernel.iso
            release/dist/kfs.bin
          generate_release_notes: true
